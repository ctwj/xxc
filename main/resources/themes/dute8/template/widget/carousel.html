{{carousel := Widget.Carousel()}}

{{ if len(carousel) > 0}}
<link rel="stylesheet" href="/swiper-bundle.min.css">
<div class="card dute-carousel-wrap">
<div class="swiper dute-home-swiper w-full overflow-hidden">
    <div class="swiper-wrapper">
        {{ range i, v :=  carousel}}
            {{ if v.Image != ""}}
                <div class="swiper-slide overflow-hidden">
                    <a class="block relative w-full h-full rounded overflow-hidden" href="{{v.Link}}">
                        <img class="w-full h-full" src="{{v.Image}}" alt="{{v.Title}}" />
                        {{ if v.Title != ""}}
                        <div class="w-full h-8 md:h-14 text-sm md:text-2xl px-3 md:px-8 absolute md:bottom-0 left-0 bottom-0 overflow-hidden bg-black bg-opacity-60 text-white font-bold flex items-center">{{v.Title}}</div>
                        {{end}}
                    </a>
                </div>
            {{end}}
        {{end}}
    </div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
</div>
</div>
<script src="/swiper-bundle.min.js"></script>
<script>
    new Swiper ('.dute-home-swiper', {
        loop: true,
        autoplay:true,
        autoHeight:true,
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
    })
</script>

{{end}}
