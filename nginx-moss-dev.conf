# Moss CMS 开发环境反向代理配置
# 假设域名: moss.your-domain.com
# 前端: Vite 开发服务器 (3000端口)
# 后端: Go 服务 (9008端口)

server {
    listen 80;
    listen 443 ssl http2;
    server_name moss.your-domain.com;
    
    # SSL 配置（如需HTTPS）
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;
    
    # 前端开发服务器代理 (Vite)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Vite HMR 支持
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    
    # 后端API代理 (Go服务)
    location /api/ {
        proxy_pass http://127.0.0.1:9008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 增加超时时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 静态文件服务（如果Go服务提供）
    location /assets/ {
        proxy_pass http://127.0.0.1:9008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 后台路径（根据moss配置，默认是/admin）
    # 开发模式：代理到 Vite 开发服务器 (3000端口)
    # 生产模式：代理到 Go 后端 (9008端口)，admin 资源已 embed 嵌入
    location /admin {
        # 开发模式使用 Vite
        proxy_pass http://127.0.0.1:3000;
        # 生产模式请改为：
        # proxy_pass http://127.0.0.1:9008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # 错误页面
    error_page 502 503 504 /502.html;
    location = /502.html {
        internal;
        return 502 "开发服务暂时不可用，请检查后端服务是否启动";
    }
    
    access_log /var/log/nginx/moss-dev.access.log;
    error_log /var/log/nginx/moss-dev.error.log;
}

# 备用：直接访问Go服务的配置（如果Vite未运行）
server {
    listen 8080;
    server_name moss.your-domain.com;
    
    location / {
        proxy_pass http://127.0.0.1:9008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    access_log /var/log/nginx/moss-go.access.log;
    error_log /var/log/nginx/moss-go.error.log;
}