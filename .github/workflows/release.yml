name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '版本号 (例如: v0.1.5)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Download Go dependencies
        working-directory: main
        run: go mod download

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: admin
        run: npm install

      - name: Build frontend
        working-directory: admin
        run: npm run build

      - name: Build backend
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        working-directory: main
        run: |
          go build -ldflags="-s -w" -trimpath -o ../moss_linux_amd64 ./cmd/web/main.go

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.VERSION }}
          git push origin ${{ steps.get_version.outputs.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Moss ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Moss CMS ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - `moss_linux_amd64` - Linux 64位可执行文件
            
            ### 使用方式
            ```bash
            chmod +x moss_linux_amd64
            ./moss_linux_amd64
            ```
            
            默认端口: 9008
            管理后台: http://localhost:9008/admin/
          files: moss_linux_amd64
          draft: false
          prerelease: false
