{{extends "./layout/layout.html"}}

{{block main()}}
<div class="container mx-auto max-w-2xl py-16">
    <div class="bg-gradient-to-br from-red-50 to-orange-50 rounded-2xl p-8 md:p-12 text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-red-500 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-clock text-white text-4xl"></i>
        </div>
        
        <h1 class="text-4xl font-bold text-gray-900 mb-4">429</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">下载频率受限</h2>
        <p class="text-gray-500 mb-8">抱歉，您的下载请求过于频繁，请稍后再试。</p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-6 py-3 bg-gradient-to-r from-primary-500 to-secondary-500 text-white rounded-full font-medium hover:from-primary-600 hover:to-secondary-600 transition-all inline-flex items-center justify-center">
                <i class="fas fa-home mr-2"></i>
                返回首页
            </a>
            <button onclick="history.back()" class="px-6 py-3 bg-white border border-gray-200 text-gray-700 rounded-full font-medium hover:bg-gray-50 transition-all inline-flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i>
                返回上页
            </button>
        </div>
    </div>
</div>
{{end}}
