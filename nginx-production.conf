# Moss CMS 生产环境 Nginx 配置
# 适用于宝塔面板环境
# 端口: 9008 (Go 后端)
# Admin 资源: embed 嵌入二进制，无需释放

server {
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name www.08rj.com;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/www.08rj.com.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/www.08rj.com/*.conf;

    #SSL-START
    ssl_certificate    /www/server/panel/vhost/cert/www.08rj.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/www.08rj.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497 https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/www.08rj.com.conf;
    #REWRITE-END

    # ========================================
    # 管理后台 - 使用 ^~ 提高优先级，避免被正则规则拦截
    # Admin 资源已 embed 到二进制中，直接代理到 Go 后端
    # ========================================
    location ^~ /admin {
        proxy_pass http://127.0.0.1:9008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # 禁用缓存，确保管理后台始终最新
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========================================
    # 网站前台 - 代理到 Go 后端
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:9008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================
    # 静态资源缓存 (排除 /admin/ 路径)
    # 注意: 使用 ^(?!/admin/) 正则排除 admin 路径
    # ========================================
    location ~ ^(?!/admin/).*\.(gif|jpg|jpeg|png|bmp|ico|svg|webp|swf)$ {
        proxy_pass http://127.0.0.1:9008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ ^(?!/admin/).*\.(js|css|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:9008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 12h;
        add_header Cache-Control "public";
        error_log /dev/null;
        access_log /dev/null;
    }

    # ========================================
    # 安全配置 - 禁止访问敏感文件和目录
    # ========================================
    location ~* /\.(git|svn|hg|idea|vscode|env)/ {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|bak|conf|toml|yaml|yml|md|lock)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ========================================
    # 日志配置
    # ========================================
    access_log /www/wwwlogs/www.08rj.com.log;
    error_log /www/wwwlogs/www.08rj.com.error.log;
}