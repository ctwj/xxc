{{extends "./layout/layout.html"}}

{{block main()}}
<div class="container mx-auto max-w-2xl py-16">
    <div class="bg-gradient-to-br from-primary-50 to-secondary-50 rounded-2xl p-8 md:p-12 text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-primary-500 to-secondary-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-triangle text-white text-4xl"></i>
        </div>
        
        <h1 class="text-6xl font-bold text-gray-900 mb-4">404</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">页面未找到</h2>
        <p class="text-gray-500 mb-8">抱歉，您访问的页面不存在或已被移除。</p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-6 py-3 bg-gradient-to-r from-primary-500 to-secondary-500 text-white rounded-full font-medium hover:from-primary-600 hover:to-secondary-600 transition-all inline-flex items-center justify-center">
                <i class="fas fa-home mr-2"></i>
                返回首页
            </a>
            <button onclick="history.back()" class="px-6 py-3 bg-white border border-gray-200 text-gray-700 rounded-full font-medium hover:bg-gray-50 transition-all inline-flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i>
                返回上页
            </button>
        </div>
    </div>
    
    <!-- Suggested Links -->
    <div class="mt-12">
        <h3 class="text-lg font-semibold text-gray-900 mb-4 text-center">或者试试以下链接</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            {{ range i, v := Category().Limit(3).List() }}
            <a href="{{ v.URL() }}" class="bg-white rounded-xl p-4 border border-gray-200 card-hover hover:shadow-lg text-center">
                <div class="w-12 h-12 bg-gradient-to-br from-primary-100 to-secondary-100 rounded-lg flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-folder text-primary-500"></i>
                </div>
                <h4 class="font-medium text-gray-900">{{ v.Name }}</h4>
            </a>
            {{ end }}
        </div>
    </div>
</div>
{{end}}
