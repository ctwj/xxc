name: Deploy Frontend to Cloudflare Pages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create Cloudflare Pages project
        run: |
          wrangler pages project create moss-frontend --production-branch main 2>&1 || echo "Project may already exist, continuing..."

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy frontend/.next --project-name=moss-frontend --commit-dirty=true
