{{ block home_recent_list(list,limit=10) }}
    {{ if len(list) == 0 }}
    <div class="dute-empty-tip">
        <span>暂无内容，敬请期待...</span>
    </div>
    {{ else }}
    <ul class="dute-recent-list">
        {{ range i, v := list }}
            {{ if i < limit }}
            <li>
                <div class="dute-recent-title">
                    <a href="{{ v.URL() }}">{{ v.Title }}</a>
                </div>
                <div class="dute-recent-meta">
                    {{ if v.CreateTime > 0 }}
                    <time>{{ v.CreateTimeFormat("01-02") }}</time>
                    {{ end }}
                    <a href="{{ v.URL() }}">查看</a>
                </div>
            </li>
            {{ end }}
        {{ end }}
    </ul>
    {{ end }}
{{ end }}
