{{ block home_download_grid(list,limit=12) }}
{{ if len(list) == 0 }}
<div class="dute-empty-tip">
    <span>暂无内容，敬请期待...</span>
</div>
{{ else }}
<div class="dute-download-grid">
    {{ range i, v := list }}
    {{ if i < limit }}
    <article class="dute-download-item">
        <a class="dute-download-thumb" href="{{ v.URL() }}">
            {{ if v.Thumbnail != "" }}
            <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-src="{{ v.Thumbnail }}" alt="{{ v.Title }}">
            {{ else }}
            <span>{{ Config.Site.Name }}</span>
            {{ end }}
        </a>
        <h3><a href="{{ v.URL() }}">{{ v.Title }}</a></h3>
    </article>
    {{ end }}
    {{ end }}
</div>
{{ end }}
{{ end }}
