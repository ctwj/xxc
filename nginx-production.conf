# Moss CMS 生产环境 Nginx 配置
# 端口: 9008 (Go 后端)
# Admin 资源: embed 嵌入二进制，无需释放
# Themes: 启动时释放到 ./themes 目录
# Public: 用户上传目录

server {
    listen 80;
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 配置
    ssl_certificate    /www/server/panel/vhost/cert/your-domain.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";

    # 错误页面
    error_page 404 /404.html;
    error_page 502 503 504 /502.html;

    # ========================================
    # 管理后台 - 使用 ^~ 提高优先级，避免被正则规则拦截
    # Admin 资源已 embed 到二进制中，直接代理到 Go 后端
    # ========================================
    location ^~ /admin {
        proxy_pass http://127.0.0.1:9008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # 禁用缓存，确保管理后台始终最新
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========================================
    # 网站前台 - 代理到 Go 后端
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:9008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================
    # 静态资源缓存 (排除 /admin/ 路径)
    # ========================================
    location ~ ^(?!/admin/).*\.(gif|jpg|jpeg|png|bmp|ico|svg|webp)$ {
        proxy_pass http://127.0.0.1:9008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^(?!/admin/).*\.(js|css|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:9008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 12h;
        add_header Cache-Control "public";
    }

    # ========================================
    # 用户上传目录 - 直接由 Nginx 提供静态文件服务（可选）
    # 如果需要 Nginx 直接服务上传文件，取消注释以下配置
    # ========================================
    # location /public/upload/ {
    #     alias /www/wwwroot/your-domain.com/public/upload/;
    #     expires 30d;
    #     add_header Cache-Control "public";
    # }

    # ========================================
    # 安全配置 - 禁止访问敏感文件和目录
    # ========================================
    location ~* /\.(git|svn|hg|idea|vscode|env)/ {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|bak|conf|toml|yaml|yml|md|lock)$ {
        deny all;
        return 404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }

    # ========================================
    # 日志配置
    # ========================================
    access_log  /www/wwwlogs/your-domain.com.log;
    error_log   /www/wwwlogs/your-domain.com.error.log;
}

