name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '版本号 (例如: v0.1.5)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: main/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install frontend dependencies
        working-directory: admin
        run: npm ci

      - name: Build frontend
        working-directory: admin
        run: npm run build

      - name: Build backend
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        working-directory: main
        run: |
          go build -ldflags="-s -w" -trimpath -o ../moss_linux_amd64 ./cmd/web/main.go

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Moss ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Moss CMS ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - `moss_linux_amd64` - Linux 64位可执行文件
            
            ### 使用方式
            ```bash
            chmod +x moss_linux_amd64
            ./moss_linux_amd64
            ```
            
            默认端口: 9008
            管理后台: http://localhost:9008/admin/
          files: moss_linux_amd64
          draft: false
          prerelease: false
